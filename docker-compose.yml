services:
  redis:
    image: redis:7-alpine
    ports:
      - \ 6379:6379\
    volumes:
      - redis_data:/data
  backend:
    build: .
    ports:
      - \5001:5001\
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis
  spaceos-agent:
    build: ./space_hitl_agent
    ports:
      - \7860:7860\
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis
volumes:
  redis_data:
