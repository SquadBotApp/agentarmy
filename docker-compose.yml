

services:
  backend:
    build: .
    command: python run_agentarmy.py
    ports:
      - "5001:5001"
    volumes:
      - .:/app
    environment:
      - MODELSLAB_API_KEY=${MODELSLAB_API_KEY}
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
  dashboard:
    build: ./dashboard
    command: node server.js
    ports:
      - "3000:3000"
    volumes:
      - ./dashboard:/dashboard
    environment:
      - NODE_ENV=development