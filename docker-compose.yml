version: "3.9"

services:
  agentarmy:
    build: .
    container_name: agentarmy
    ports:
      - "5001:5001"
    environment:
      PYTHONUNBUFFERED: "1"
      PYTHONPATH: "/app:/app/core"
    volumes:
      - .:/app
    command: ["python", "main.py"]
      redis:
        condition: service_healthy

  spaceos-agent:
    build: ./space_hitl_agent
    command: python main.py --station haven-1
    ports:
      - "7860:7860"
    volumes:
      - ./space_hitl_agent:/app
    environment:
      - PYTHONUNBUFFERED=1
      - REDIS_URL=redis://redis:6379/0
      - STATION_TYPE=haven-1
    depends_on:
      redis:
        condition: service_healthy
    profiles:
      - spaceos

  tests:
    build: .
    command: pytest -v --tb=short
    environment:
      - PYTHONUNBUFFERED=1
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - backend
      - redis
    profiles:
      - test

volumes:
  redis_data:
