# CI/CD Pipeline for Genesis Multi-Agent OS

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-asyncio pytest-cov flake8 httpx
    - name: Lint code
      run: flake8 . --exclude=tests --max-line-length=120
    - name: Run unit tests
      run: pytest tests/ -v --cov=. --cov-report=xml --ignore=tests/test_end_to_end.py || true

  build-and-push:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == "refs/heads/main" && github.event_name == "push"
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    - name: Login to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    - name: Build and push Docker image
      uses: docker/build-push-action@v6
      with:
        context: .
        push: true
        tags: ghcr.io/${{ github.repository_owner }}/genesis-os:latest

  deploy-staging:
    runs-on: ubuntu-latest
    needs: [test, build-and-push]
    if: github.ref == "refs/heads/main"
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: Deploy to staging
      run: |
        echo "Deploying to staging environment..."

  deploy-production:
    runs-on: ubuntu-latest
    needs: [test, build-and-push, deploy-staging]
    if: github.ref == "refs/heads/main" && github.event_name == "push"
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: Pull production image
      run: |
        docker pull ghcr.io/${{ github.repository_owner }}/genesis-os:latest
    - name: Deploy to production
      run: |
        echo "Deploying Genesis OS to production..."
