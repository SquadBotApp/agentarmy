# Production Docker Compose for Genesis Multi-Agent OS
# Usage: docker-compose -f docker-compose.prod.yml up -d

version: '3.8'

services:
  genesis-os:
    build:
      context: .
      dockerfile: Dockerfile
    image: ghcr.io/${GITHUB_REPOSITORY:-genesis-os}/genesis-os:latest
    container_name: genesis-os
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - LOG_LEVEL=INFO
      - DATABASE_URL=${DATABASE_URL:-postgresql://user:pass@db:5432/genesis}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    depends_on:
      - db
      - redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data

  db:
    image: postgres:15-alpine
    container_name: genesis-db
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=pass
      - POSTGRES_DB=genesis
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: genesis-redis
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
