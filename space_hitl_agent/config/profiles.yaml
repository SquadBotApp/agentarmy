# Space HITL Agent - Configurable Profiles
# This file defines different operational profiles for various mission scenarios

# ============================================================================
# Profile: Uncrewed Mode
# ============================================================================
uncrewed:
  description: "Uncrewed/autonomous operations - maximum automation with safety limits"
  
  # Telemetry settings
  telemetry:
    cycle_interval_seconds: 30
    anomaly_injection_probability: 0.15
  
  # Human-in-the-loop settings
  hitl:
    auto_approve_nominal: true
    auto_approve_confidence_threshold: 0.95
    require_approval_for: ["critical", "warning"]
  
  # Safety settings
  safety:
    enforce_no_go_zones: true
    action_cooldowns_enabled: true
    two_person_approval_for_life_support: false
    audit_logging: true
  
  # Agent thresholds
  thresholds:
    power_warning: 6.0  # kW
    power_critical: 3.0
    temp_warning: 30.0  # Celsius
    temp_critical: 38.0
    pressure_warning: 97.0  # kPa
    pressure_critical: 93.0
    oxygen_warning: 92.0  # %
    oxygen_critical: 85.0
  
  # Enabled agents
  enabled_agents:
    - power
    - thermal
    - attitude
    - payload
    - logistics
  
  # External data
  external_data:
    include_iss_position: true
    include_norad_elements: true
    include_starlink: false


# ============================================================================
# Profile: Crewed Mode
# ============================================================================
crewed:
  description: "Crewed operations - human oversight with crew safety priority"
  
  # Telemetry settings
  telemetry:
    cycle_interval_seconds: 10
    anomaly_injection_probability: 0.20
  
  # Human-in-the-loop settings
  hitl:
    auto_approve_nominal: false
    auto_approve_confidence_threshold: 0.99
    require_approval_for: ["critical", "warning", "nominal"]
  
  # Safety settings
  safety:
    enforce_no_go_zones: true
    action_cooldowns_enabled: true
    two_person_approval_for_life_support: true
    audit_logging: true
  
  # Agent thresholds (more conservative for crewed)
  thresholds:
    power_warning: 8.0
    power_critical: 5.0
    temp_warning: 28.0
    temp_critical: 35.0
    pressure_warning: 99.0
    pressure_critical: 95.0
    oxygen_warning: 95.0
    oxygen_critical: 88.0
  
  # Enabled agents (all)
  enabled_agents:
    - power
    - thermal
    - life_support
    - attitude
    - payload
    - logistics
  
  # External data
  external_data:
    include_iss_position: true
    include_norad_elements: true
    include_starlink: true


# ============================================================================
# Profile: Experiment Mode
# ============================================================================
experiment:
  description: "Science experiment operations - focus on payload/science agents"
  
  # Telemetry settings
  telemetry:
    cycle_interval_seconds: 60
    anomaly_injection_probability: 0.10
  
  # Human-in-the-loop settings
  hitl:
    auto_approve_nominal: true
    auto_approve_confidence_threshold: 0.90
    require_approval_for: ["critical"]
  
  # Safety settings
  safety:
    enforce_no_go_zones: true
    action_cooldowns_enabled: false  # Faster response for experiments
    two_person_approval_for_life_support: false
    audit_logging: true
  
  # Agent thresholds
  thresholds:
    power_warning: 5.0
    power_critical: 2.0
    temp_warning: 32.0
    temp_critical: 40.0
    pressure_warning: 97.0
    pressure_critical: 93.0
    oxygen_warning: 90.0
    oxygen_critical: 80.0
  
  # Enabled agents (focus on payload)
  enabled_agents:
    - power
    - thermal
    - payload
  
  # External data
  external_data:
    include_iss_position: true
    include_norad_elements: false
    include_starlink: false


# ============================================================================
# Profile: Docking Mode
# ============================================================================
