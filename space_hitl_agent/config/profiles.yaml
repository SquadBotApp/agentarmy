  # Telemetry settings
  telemetry:
    cycle_interval_seconds: 5
    anomaly_injection_probability: 0.25
  
  # Human-in-the-loop settings
  hitl:
    auto_approve_nominal: false
    auto_approve_confidence_threshold: 0.99
    require_approval_for: ["critical", "warning", "nominal"]
  
  # Safety settings
  safety:
    enforce_no_go_zones: true
    action_cooldowns_enabled: false  # Quick response for docking
    two_person_approval_for_life_support: true
    audit_logging: true
  
  # Agent thresholds
  thresholds:
    power_warning: 7.0
    power_critical: 4.0
    temp_warning: 28.0
    temp_critical: 35.0
    pressure_warning: 99.0
    pressure_critical: 95.0
    oxygen_warning: 95.0
    oxygen_critical: 88.0
  
  # Enabled agents (focus on attitude)
  enabled_agents:
    - power
    - thermal
    - life_support
    - attitude
  
  # External data
  external_data:
    include_iss_position: true
    include_norad_elements: true
    include_starlink: true


# ============================================================================
# Profile: Safe Mode
# ============================================================================
safe_mode:
  description: "Emergency safe mode - minimal operations, maximum safety"
  
  # Telemetry settings
  telemetry:
    cycle_interval_seconds: 5
    anomaly_injection_probability: 0.40
  
  # Human-in-the-loop settings
  hitl:
    auto_approve_nominal: false
    auto_approve_confidence_threshold: 1.0
    require_approval_for: ["critical", "warning", "nominal"]
  
  # Safety settings (maximum safety)
  safety:
    enforce_no_go_zones: true
    action_cooldowns_enabled: true
    two_person_approval_for_life_support: true
    audit_logging: true
  
  # Agent thresholds (very conservative)
  thresholds:
    power_warning: 10.0
    power_critical: 6.0
    temp_warning: 26.0
    temp_critical: 32.0
    pressure_warning: 100.0
    pressure_critical: 97.0
    oxygen_warning: 97.0
    oxygen_critical: 92.0
  
  # Enabled agents (all)
  enabled_agents:
    - power
    - thermal
    - life_support
    - attitude
    - payload
    - logistics
  
  # External data
  external_data:
    include_iss_position: true
    include_norad_elements: true
    include_starlink: true


# ============================================================================
# Default Settings
# ============================================================================
default:
  # Station type
  station_type: "haven-1"
  
  # Simulation mode
  simulation_mode: true
  
  # Logging
  log_level: "INFO"
  log_to_file: true
  log_rotation: "daily"
  
  # API keys (should be set via environment variables)
  api_keys:
    google_api_key: "${GOOGLE_API_KEY}"
    openai_api_key: "${OPENAI_API_KEY}"
    groq_api_key: "${GROQ_API_KEY}"
  
  # Dashboard
  dashboard:
    enabled: true
    port: 7860
    share: false
  
  # Plugins
  plugins:
    enabled: false
    directory: "./plugins"

