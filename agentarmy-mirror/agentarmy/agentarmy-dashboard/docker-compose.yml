version: '3.8'

services:
  # Frontend (React)
  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    ports:
      - "3000:3000"
    environment:
      REACT_APP_BACKEND_URL: http://backend:4000
      REACT_APP_ORCHESTRATION_URL: http://orchestration:5000
    depends_on:
      - backend
    networks:
      - agentarmy

  # Backend (Node.js Express)
  backend:
    build:
      context: ./server
      dockerfile: ../docker/Dockerfile.backend
    ports:
      - "4000:4000"
    environment:
      PORT: 4000
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-prod}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      XAI_API_KEY: ${XAI_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      ORCHESTRATION_SERVICE_URL: http://orchestration:5000
    depends_on:
      - orchestration
    networks:
      - agentarmy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Orchestration Service (Python + CrewAI)
  orchestration:
    build:
      context: ./orchestration
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      ORCHESTRATION_PORT: 5000
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      XAI_API_KEY: ${XAI_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      LOG_LEVEL: INFO
    networks:
      - agentarmy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # PostgreSQL (Optional: for persistence, production)
  postgres:
    image: postgres:15-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: agentarmy
      POSTGRES_PASSWORD: ${DB_PASSWORD:-dev-password}
      POSTGRES_DB: agentarmy
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - agentarmy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentarmy"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis (Optional: for caching/job queue)
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - agentarmy
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  agentarmy:
    driver: bridge

volumes:
  postgres_data:
