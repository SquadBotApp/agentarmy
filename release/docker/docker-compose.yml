version: '3.8'
services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped
    redis:
      image: redis:7-alpine
      ports:
        - "6379:6379"
      restart: unless-stopped
  dashboard:
    build: .
    command: ["python", "-m", "space_hitl_agent.ui.gradio_dashboard"]
    ports:
      - "8080:8080"
    env_file:
      - ../../.env
    volumes:
      - ../../release/dashboard:/app/dashboard
      - ../../release/config:/app/config
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379

  power-agent:
    build: .
    command: ["python", "/app/agents/power_agent.py"]
    volumes:
      - ../agents:/app/agents
      - ../config:/app/config
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379

  thermal-agent:
    build: .
    command: ["python", "/app/agents/thermal_agent.py"]
    volumes:
      - ../agents:/app/agents
      - ../config:/app/config
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379

  life-support-agent:
    build: .
    command: ["python", "/app/agents/life_support_agent.py"]
    volumes:
      - ../agents:/app/agents
      - ../config:/app/config
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379

  attitude-orbit-agent:
    build: .
    command: ["python", "/app/agents/attitude_orbit_agent.py"]
    volumes:
      - ../agents:/app/agents
      - ../config:/app/config
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379

  payload-agent:
    build: .
    command: ["python", "/app/agents/payload_agent.py"]
    volumes:
      - ../agents:/app/agents
      - ../config:/app/config
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379

  logistics-agent:
    build: .
    command: ["python", "/app/agents/logistics_agent.py"]
    volumes:
      - ../agents:/app/agents
      - ../config:/app/config
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379

  telemetry-connector:
    build: .
    command: ["python", "/app/space_hitl_agent/nodes/telemetry.py"]
    volumes:
      - ../../space_hitl_agent:/app/space_hitl_agent
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - ../../release/config:/app/config
